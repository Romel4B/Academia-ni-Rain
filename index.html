<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --purple: #0a3a02;
            --orange: #ff9f1c;
            --gradient: linear-gradient(90deg, #023c00, #199700);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Poppins, sans-serif
        }

        body {
            background: #f4f4f4;
            color: #333
        }

         nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            z-index: 999;
        }

        nav .logo {
            color: #ffffff;
            font-weight: 700;
            font-size: 24px
        }

        nav ul {
            display: flex;
            gap: 30px;
            list-style: none
        }

        nav ul li {
            cursor: pointer
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        nav ul li:hover {
            opacity: .7
        }

        .hero {
            height: 90vh;
            background: url('adp.jpg') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero button a {
            color: white;
            text-decoration: none;
            display: inline-block;
        }

            .hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0, 42, 6, 0.45);
            }

            .hero-content {
                position: relative;
                z-index: 1
            }

            .hero h1 {
                font-size: 70px;
                font-weight: 700;
                letter-spacing: 2px
            }

            .hero h2 {
                font-family: Pacifico, cursive;
                font-size: 48px;
                margin-top: -20px
            }

            .hero button {
                margin-top: 30px;
                padding: 14px 40px;
                border: none;
                border-radius: 40px;
                background: var(--gradient);
                color: white;
                font-weight: 600;
                cursor: pointer;
                transition: .3s;
            }

            .hero button:hover {
                transform: scale(1.05)
            }

            .section {
                padding: 80px 20px;
                text-align: center
            }

            .section h2 {
                font-size: 32px;
                margin-bottom: 10px
            }

            .section p {
                max-width: 600px;
                margin: auto;
                color: #666
            }

            @media(max-width:900px) {
                .hero h1 {
                    font-size: 40px
                }

                .hero h2 {
                    font-size: 28px
                }

                .form {
                    grid-template-columns: 1fr 1fr
                }
            }
    </style>
</head>

<body>

    <nav>
        <div class="logo">ACADEMIA DE PULILAN</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about1.html">About</a></li>
            <li><a href="gallery1.html">Gallery</a></li>
            <li><a href="https://www.adpi.school/">News</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>SENIOR HIGHSCHOOL</h1>
            <h2>JOURNEY</h2>
            <button><a href=https://youtu.be/xKk655CDFn8?si=nVHaAVbpsbChtQPI&t=393 target="_blank">CLICK
                    HERE</a></button>
        </div>
    </section>

    <section class="section">
        <audio controls loop autoplay">
            <source src="iam.mp3" type="audio/mpeg">
        </audio>
        <h2>I am to Learn </h2>
        <p>I am a citizen of the city school.</p>
    </section>

</body>

</html>
